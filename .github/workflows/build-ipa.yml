name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: "Export method (ad-hoc | app-store | development)"
        required: false
        default: "ad-hoc"
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Archive & Export IPA
    runs-on: macos-latest

    env:
      PROJECT_PATH: CodexMobile/CodexMobile.xcodeproj
      SCHEME: CodexMobile
      ARCHIVE_PATH: /tmp/CodexMobile.xcarchive
      IPA_DIR: /tmp/CodexMobile-IPA
      EXPORT_OPTIONS: CodexMobile/BuildSupport/ExportOptions.plist
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: build-keychain-password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Signing: import certificate & provisioning profile ──────────────────
      # Required GitHub Secrets:
      #   IOS_DIST_CERTIFICATE_BASE64   – base64 of your .p12 distribution cert
      #   IOS_DIST_CERTIFICATE_PASSWORD – password for the .p12
      #   IOS_PROVISIONING_PROFILE_BASE64 – base64 of your .mobileprovision
      #   PROVISIONING_PROFILE_NAME     – display name of the provisioning profile
      # ────────────────────────────────────────────────────────────────────────
      - name: Import distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=/tmp/dist_cert.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_NAME" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_PATH"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH/build_profile.mobileprovision"

      - name: Set provisioning profile name in ExportOptions.plist
        env:
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          EXPORT_METHOD: ${{ github.event.inputs.export_method || 'ad-hoc' }}
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :provisioningProfiles:com.emanueledipietro.Remodex $PROVISIONING_PROFILE_NAME" \
            "$EXPORT_OPTIONS"
          /usr/libexec/PlistBuddy -c \
            "Set :method $EXPORT_METHOD" \
            "$EXPORT_OPTIONS"

      # ── Optional: apply private xcconfig overrides ───────────────────────────
      # If you store PrivateOverrides.xcconfig content in a Secret, decode it here.
      - name: Apply PrivateOverrides.xcconfig (optional)
        env:
          PRIVATE_XCCONFIG: ${{ secrets.PRIVATE_XCCONFIG_BASE64 }}
        run: |
          if [ -n "$PRIVATE_XCCONFIG" ]; then
            echo "$PRIVATE_XCCONFIG" | base64 --decode > \
              CodexMobile/BuildSupport/PrivateOverrides.xcconfig
          fi

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Archive
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=HR24WHR326 \
            archive | xcpretty || xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=HR24WHR326 \
            archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS"

      # ── Artifact ────────────────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexMobile-${{ github.ref_name }}-${{ github.run_number }}
          path: /tmp/CodexMobile-IPA/*.ipa
          retention-days: 14

      # ── Cleanup ─────────────────────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" || true
